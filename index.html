        const Unidades=(num)=>{switch(num){case 1:return'UN';case 2:return'DOS';case 3:return'TRES';case 4:return'CUATRO';case 5:return'CINCO';case 6:return'SEIS';case 7:return'SIETE';case 8:return'OCHO';case 9:return'NUEVE';default:return'';}};
        const Decenas=(num)=>{const decena=Math.floor(num/10);const unidad=num-(decena*10);switch(decena){case 1:switch(unidad){case 0:return'DIEZ';case 1:return'ONCE';case 2:return'DOCE';case 3:return'TRECE';case 4:return'CATORCE';case 5:return'QUINCE';default:return'DIECI'+Unidades(unidad);}case 2:switch(unidad){case 0:return'VEINTE';default:return'VEINTI'+Unidades(unidad);}case 3:return DecenasY('TREINTA',unidad);case 4:return DecenasY('CUARENTA',unidad);case 5:return DecenasY('CINCUENTA',unidad);case 6:return DecenasY('SESENTA',unidad);case 7:return DecenasY('SETENTA',unidad);case 8:return DecenasY('OCHENTA',unidad);case 9:return DecenasY('NOVENTA',unidad);case 0:return Unidades(unidad);default:return'';}};

        // --- COMPONENTE MÓDULO ESTADÍSTICAS ---
        function ModuloEstadisticas({ fianzas, seguros }) {
          const getStats = (data) => {
            let vigentes = 0, riesgo = 0, vencidas = 0;
            data.forEach(item => {
              const d = calculateDays(item.termino);
              if (d < 0) vencidas++; else if (d <= 60) riesgo++; else vigentes++;
            });
            const total = data.length;
            const porcentaje = total === 0 ? 0 : Math.round((vigentes / total) * 100);
            return { total, vigentes, riesgo, vencidas, porcentaje };
          };

          const statsFianzas = getStats(fianzas);
          const statsSeguros = getStats(seguros);
          const globalTotal = statsFianzas.total + statsSeguros.total;
          const globalVigentes = statsFianzas.vigentes + statsSeguros.vigentes;
          const globalPorcentaje = globalTotal === 0 ? 0 : Math.round((globalVigentes / globalTotal) * 100);

          const radius = 60;

                    </div>
                    <div className="bg-red-50 border border-red-100 p-4 rounded">
                      <div className="text-3xl font-bold text-red-600">{statsFianzas.vencidas + statsSeguros.vencidas}</div>
                      <div className="text-xs font-bold uppercase text-red-800 mt-1">Vencidas</div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Desglose por Departamento */}

                      <div className="w-full bg-slate-100 rounded-full h-2.5"><div className="bg-emerald-500 h-2.5 rounded-full progress-bar-fill" style={{width: `${statsFianzas.porcentaje}%`}}></div></div>

          const [yearActual, setYearActual] = useState(''); const [mesActual, setMesActual] = useState('');

          const handleAutoINPC = (year, month, setter) => { if (year && month && INPC_DB[year] && INPC_DB[year][month]) setter(INPC_DB[year][month]); };

          const montoCalculado = useMemo(() => {
            const base = parseFloat(inpcBase); const actual = parseFloat(inpcActual); const montoBase = parseFloat(montoBaseManual);
            if (!isNaN(base) && base > 0 && !isNaN(actual) && actual > 0 && !isNaN(montoBase)) return montoBase * (actual / base);
            return montoBase || 0;
          }, [inpcBase, inpcActual, montoBaseManual]);

          const montoFinalTexto = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(montoCalculado);
          const montoEnLetras = numeroALetras(montoCalculado);
          
          const textoRef = useRef(null);
          const [copiado, setCopiado] = useState(false);
          const handleCopy = () => { navigator.clipboard.writeText(textoRef.current.innerText); setCopiado(true); setTimeout(() => setCopiado(false), 2000); };

          return (
            <div className="space-y-6">
              <button onClick={onBack} className="flex items-center gap-2 text-brand-gris hover:text-brand-guinda transition font-bold"><ChevronLeft className="w-5 h-5" /> Regresar</button>
              
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div className="lg:col-span-6 space-y-6">
                  {/* CALCULADORA */}
                  <div className="bg-white p-6 rounded shadow-sm border border-brand-gris/20 border-t-4 border-t-brand-dorado">
                    <h3 className="text-lg font-bold text-brand-oscuro flex items-center gap-2 mb-6"><Calculator className="w-5 h-5 text-brand-dorado" /> Renovación y Actualización INPC</h3>
                    
                    <div className="mb-6 space-y-3 p-4 rounded border border-brand-gris/20 bg-slate-50">
                      <h4 className="font-bold text-sm text-brand-oscuro mb-2 border-b border-brand-gris/20 pb-1">Datos Generales del Contrato</h4>
                      <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Empresa</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={empresa} onChange={(e)=>setEmpresa(e.target.value)} /></div>
                      <div className="grid grid-cols-2 gap-3">
                        <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Representante Legal</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={contacto} onChange={(e)=>setContacto(e.target.value)} /></div>
                        <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Vencimiento Póliza</label><input type="date" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={termino} onChange={(e)=>setTermino(e.target.value)} /></div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Nombre Contrato</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={servicio} onChange={(e)=>setServicio(e.target.value)} /></div>
                        <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Número Contrato</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none uppercase" value={numContrato} onChange={(e)=>setNumContrato(e.target.value)} /></div>
                      </div>
                    </div>

                    <div className="mb-6 bg-white p-4 rounded border border-brand-gris/20">
                      <label className="text-xs text-brand-guinda uppercase font-bold block mb-2">Monto Base Inamovible ($)</label>
                      <input type="number" className="w-full bg-slate-50 px-3 py-2 border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none font-bold text-lg text-brand-oscuro" value={montoBaseManual} onChange={(e) => setMontoBaseManual(e.target.value)} />
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="space-y-2 p-4 border border-brand-gris/20 rounded bg-white">
                        <label className="block text-sm font-bold text-brand-oscuro">INPC Base (Contrato)</label>
                        <div className="flex gap-2">
                          <select className="flex-1 px-2 py-1.5 border border-brand-gris/30 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-brand-dorado" value={yearBase} onChange={(e) => { setYearBase(e.target.value); handleAutoINPC(e.target.value, mesBase, setInpcBase); }}><option value="">Año</option>{Object.keys(INPC_DB).map(y => <option key={y} value={y}>{y}</option>)}</select>
                          <select className="flex-1 px-2 py-1.5 border border-brand-gris/30 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-brand-dorado" value={mesBase} onChange={(e) => { setMesBase(e.target.value); handleAutoINPC(yearBase, e.target.value, setInpcBase); }}><option value="">Mes</option>{MESES.map(m => <option key={m.val} value={m.val}>{m.label}</option>)}</select>
                        </div>
                        <input type="number" step="0.0001" placeholder="Valor INPC" className="w-full px-3 py-2 border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none mt-2 font-bold text-brand-verde" value={inpcBase} onChange={(e) => setInpcBase(e.target.value)} />
                      </div>
                      <div className="space-y-2 p-4 border border-brand-gris/20 rounded bg-white">
                        <label className="block text-sm font-bold text-brand-oscuro">INPC Actualización</label>
                        <div className="flex gap-2">
                          <select className="flex-1 px-2 py-1.5 border border-brand-gris/30 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-brand-dorado" value={yearActual} onChange={(e) => { setYearActual(e.target.value); handleAutoINPC(e.target.value, mesActual, setInpcActual); }}><option value="">Año</option>{Object.keys(INPC_DB).map(y => <option key={y} value={y}>{y}</option>)}</select>
                          <select className="flex-1 px-2 py-1.5 border border-brand-gris/30 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-brand-dorado" value={mesActual} onChange={(e) => { setMesActual(e.target.value); handleAutoINPC(yearActual, e.target.value, setInpcActual); }}><option value="">Mes</option>{MESES.map(m => <option key={m.val} value={m.val}>{m.label}</option>)}</select>
                        </div>
                        <input type="number" step="0.0001" placeholder="Valor INPC" className="w-full px-3 py-2 border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none mt-2 font-bold text-brand-verde" value={inpcActual} onChange={(e) => setInpcActual(e.target.value)} />
                      </div>
                    </div>
                    
                    <div className="mt-6 p-5 bg-brand-oscuro rounded shadow-inner text-center">
                      <div className="text-sm text-brand-dorado font-bold uppercase tracking-wide">Monto Actualizado a Solicitar</div>
                      <div className="text-4xl font-bold text-white mt-2">{montoFinalTexto}</div>
                    </div>
                  </div>
                  
                  {/* ACTUALIZAR SEMÁFORO */}
                  <div className="bg-white p-6 rounded shadow-sm border border-brand-gris/20 border-l-4 border-l-brand-verde flex justify-between items-center">
                    <div>
                      <h4 className="font-bold text-brand-oscuro">Confirmar Recepción de Póliza</h4>
                      <p className="text-sm text-brand-gris">Guarda la nueva fecha para resetear el semáforo a verde.</p>
                    </div>
                    <button onClick={() => termino && onUpdateDate(fianza.id, termino)} className="bg-brand-verde text-white px-5 py-2.5 rounded font-bold hover:bg-opacity-90 transition shadow">Actualizar Semáforo</button>
                  </div>
                </div>

                <div className="lg:col-span-6 flex flex-col">
                  {/* PLANTILLA DE OFICIO */}
                  <div className="bg-brand-oscuro p-3 rounded-t flex justify-between items-center px-4">
                    <h3 className="text-sm font-bold text-brand-dorado flex items-center gap-2"><FileText className="w-4 h-4" /> Plantilla: Oficio de Renovación</h3>
                    <button onClick={handleCopy} className={`flex items-center gap-1 px-4 py-1.5 rounded text-sm font-bold transition shadow ${copiado ? 'bg-brand-dorado text-brand-oscuro' : 'bg-white text-brand-oscuro hover:bg-gray-100'}`}>{copiado ? <CheckCircle className="w-4 h-4" /> : <Copy className="w-4 h-4" />}{copiado ? 'Copiado' : 'Copiar Texto'}</button>
                  </div>
                  <div className="bg-white border-l border-r border-b border-brand-gris/20 rounded-b p-10 shadow-sm flex-1 font-serif text-[15px] leading-relaxed whitespace-pre-wrap text-black" ref={textoRef}>
{`C. ${contacto || '[Contacto]'}
${empresa}
P R E S E N T E 

Por medio del presente y en relación a su Contrato de ${servicio}, con número de registro ${numContrato}. 

Al respecto, se solicita remitir con carácter de URGENTE a esta Entidad, el endoso de actualización de la fianza número ${fianza.poliza}, emitida por ${fianza.afianzadora} y considerada en la cláusula ${fianza.clausula} del citado contrato, por un importe actualizado de ${montoFinalTexto} (${montoEnLetras}).

Para lo anterior, deberá enviar la póliza, el comprobante de pago, el archivo XML y su complemento de pago en un término de cinco (05) días hábiles, contados a partir de la recepción del presente oficio.  

No se omite mencionar, que no mantener en vigor la póliza de fianza podrá derivar en la aplicación de penas convencionales, conforme a lo dispuesto en el mencionado instrumento contractual.

Sin otro particular, reciba un cordial saludo. 

A T E N T A M E N T E


Lic. Evodio Cruz Segura
Gerente de Comercialización`}
                  </div>
                </div>
              </div>

              {/* HISTORIAL DE ACCIONES (Fianzas) */}
              <HistorialAcciones historial={fianza.historial} onAddAction={onAddAction} />

            </div>
          );
        }

        function RenewSeguroForm({ seguro, onUpdateDate, onAddAction, onBack }) {
          const [empresa, setEmpresa] = useState(seguro.empresa || '');
          const [contacto, setContacto] = useState(seguro.contacto || '');
          const [servicio, setServicio] = useState(seguro.servicio || 'Prestación de Servicios');
          const [numContrato, setNumContrato] = useState(seguro.numContrato || '');
          const [termino, setTermino] = useState(seguro.termino || '');

          const textoRef = useRef(null);
          const [copiado, setCopiado] = useState(false);
          const handleCopy = () => { navigator.clipboard.writeText(textoRef.current.innerText); setCopiado(true); setTimeout(() => setCopiado(false), 2000); };

          return (
            <div className="space-y-6">
              <button onClick={onBack} className="flex items-center gap-2 text-brand-gris hover:text-brand-guinda transition font-bold"><ChevronLeft className="w-5 h-5" /> Regresar</button>
              
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div className="lg:col-span-5 space-y-6">
                  {/* DATOS DE SEGURO */}
                  <div className="bg-white p-6 rounded shadow-sm border border-brand-gris/20 border-t-4 border-t-brand-dorado">
                     <h3 className="text-lg font-bold text-brand-oscuro flex items-center gap-2 mb-6"><Shield className="w-5 h-5 text-brand-dorado" /> Renovación de Seguro</h3>
                     <div className="space-y-3 p-4 rounded border border-brand-gris/20 bg-slate-50">
                        <h4 className="font-bold text-sm text-brand-oscuro mb-2 border-b border-brand-gris/20 pb-1">Datos Generales del Documento</h4>
                        <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Empresa</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={empresa} onChange={(e)=>setEmpresa(e.target.value)} /></div>
                        <div className="grid grid-cols-2 gap-3">
                          <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Representante Legal</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={contacto} onChange={(e)=>setContacto(e.target.value)} /></div>
                          <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Vencimiento Póliza</label><input type="date" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={termino} onChange={(e)=>setTermino(e.target.value)} /></div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Nombre Contrato</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none" value={servicio} onChange={(e)=>setServicio(e.target.value)} /></div>
                          <div><label className="block text-xs font-bold text-brand-gris mb-1 uppercase">Número Contrato</label><input type="text" className="w-full px-2 py-1.5 text-sm border border-brand-gris/30 rounded focus:ring-2 focus:ring-brand-dorado outline-none uppercase" value={numContrato} onChange={(e)=>setNumContrato(e.target.value)} /></div>
                        </div>
                     </div>
                  </div>

                  {/* ACTUALIZAR SEMÁFORO */}
                  <div className="bg-white p-6 rounded shadow-sm border border-brand-gris/20 border-l-4 border-l-brand-verde flex justify-between items-center">
                    <div>
                      <h4 className="font-bold text-brand-oscuro">Confirmar Recepción de Póliza</h4>
                      <p className="text-sm text-brand-gris">Guarda la nueva fecha para resetear el semáforo a verde.</p>
                    </div>
                    <button onClick={() => termino && onUpdateDate(seguro.id, termino)} className="bg-brand-verde text-white px-5 py-2.5 rounded font-bold hover:bg-opacity-90 transition shadow">Actualizar Semáforo</button>
                  </div>
                </div>

                <div className="lg:col-span-7 flex flex-col">
                  {/* PLANTILLA DE OFICIO */}
                  <div className="bg-brand-oscuro p-3 rounded-t flex justify-between items-center px-4">
                    <h3 className="text-sm font-bold text-brand-dorado flex items-center gap-2"><FileText className="w-4 h-4" /> Plantilla: Oficio Solicitud Renovación</h3>
                    <button onClick={handleCopy} className={`flex items-center gap-1 px-4 py-1.5 rounded text-sm font-bold transition shadow ${copiado ? 'bg-brand-dorado text-brand-oscuro' : 'bg-white text-brand-oscuro hover:bg-gray-100'}`}>{copiado ? <CheckCircle className="w-4 h-4" /> : <Copy className="w-4 h-4" />}{copiado ? 'Copiado' : 'Copiar Texto'}</button>
                  </div>
                  <div className="bg-white border-l border-r border-b border-brand-gris/20 rounded-b p-10 shadow-sm flex-1 font-serif text-[15px] leading-relaxed whitespace-pre-wrap text-black" ref={textoRef}>
{`C. ${contacto || '[Contacto]'}
${empresa}
P R E S E N T E

Por medio del presente, en relación a su Contrato de ${servicio} con número de registro ${numContrato}, y en atención a la verificación de cumplimiento que esta Entidad está llevando a cabo respecto a los seguros que deben obrar dentro de su expediente.

Se solicita amablemente, me sea enviada la renovación de la siguiente póliza de seguro, acompañando copia de pago, complemento de pago y XML correspondiente.

A continuación, hago referencia a la póliza señalada en el párrafo anterior: 

ASEGURADORA: ${seguro.aseguradora}
PÓLIZA:      ${seguro.poliza}
DESCRIPCIÓN: ${seguro.descripcion}
VENCIMIENTO: ${termino}

Agradeceré me confirme de recibido por esta misma vía.

Sin otro particular, reciba un cordial saludo.

A T E N T A M E N T E


Lic. Evodio Cruz Segura
Gerente de Comercialización`}
                  </div>
                </div>
              </div>

              {/* HISTORIAL DE ACCIONES (Seguros) */}
              <HistorialAcciones historial={seguro.historial} onAddAction={onAddAction} />

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
